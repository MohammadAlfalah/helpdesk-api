<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HelpDesk</title>
<link rel="icon" href="/assets/logo-mark.svg" />
<link rel="stylesheet" href="/styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: var(--bg); font-family: var(--font-sans); color: var(--text-body); }
  #app { height: 100vh; display: flex; overflow: hidden; }
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .content { flex: 1; min-width: 0; position: relative; overflow: hidden; }
  .center-msg { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--text-muted); padding: 24px; box-sizing: border-box; }
  .flash { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 80;
           background: var(--charcoal-900, #221C18); color: var(--cream-50, #FAF6F0);
           padding: 11px 18px; border-radius: var(--radius-full); box-shadow: var(--shadow-lg);
           font: var(--font-small); max-width: 90%; text-align: center; }
  .login-wrap { height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px; box-sizing: border-box; }
  .link-btn { background: none; border: none; padding: 0; cursor: pointer; color: var(--brand); font: inherit; font-weight: var(--weight-medium); }
  @media (max-width: 860px) {
    .stat-row { flex-wrap: wrap; }
    .stat-row > * { min-width: calc(50% - 7px); }
  }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>

<!-- design system (compiled component library) -->
<script src="/_ds_bundle.js"></script>
<script>window.DS = window.HelpDeskDesignSystem_35c226;</script>

<!-- API client + screens (load order: utils → shared → components → apps → root) -->
<script src="/app/api.js"></script>
<script type="text/babel" src="/app/util.jsx"></script>
<script type="text/babel" src="/app/shared.jsx"></script>
<script type="text/babel" src="/app/Sidebar.jsx"></script>
<script type="text/babel" src="/app/Topbar.jsx"></script>
<script type="text/babel" src="/app/TicketInbox.jsx"></script>
<script type="text/babel" src="/app/TicketDetail.jsx"></script>
<script type="text/babel" src="/app/AgentsPage.jsx"></script>
<script type="text/babel" src="/app/ReportsPage.jsx"></script>
<script type="text/babel" src="/app/AgentApp.jsx"></script>
<script type="text/babel" src="/app/CustomerApp.jsx"></script>

<script type="text/babel">
  const api = window.HelpDeskApi;
  const { Button, Input, Card } = window.DS;

  // ---- Sign in / Sign up --------------------------------------------------
  function AuthView({ onAuthed }) {
    const [mode, setMode] = React.useState('login'); // 'login' | 'register'
    const [fullName, setFullName] = React.useState('');
    const [email, setEmail] = React.useState('agent@helpdesk.local');
    const [password, setPassword] = React.useState('Agent#12345');
    const [error, setError] = React.useState(null);
    const [busy, setBusy] = React.useState(false);
    React.useEffect(() => { window.lucide && window.lucide.createIcons(); });

    function switchMode(next) {
      setMode(next); setError(null);
      if (next === 'register') { setEmail(''); setPassword(''); setFullName(''); }
      else { setEmail('agent@helpdesk.local'); setPassword('Agent#12345'); }
    }

    async function submit(e) {
      e.preventDefault();
      setError(null); setBusy(true);
      try {
        const u = mode === 'login'
          ? await api.login(email.trim(), password)
          : await api.register(email.trim(), fullName.trim(), password);
        onAuthed(u);
      } catch (ex) { setError(ex.message || 'Something went wrong.'); setBusy(false); }
    }

    const isRegister = mode === 'register';
    return (
      <div className="login-wrap">
        <Card style={{ width: 392, maxWidth: '100%', padding: 32 }}>
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 8 }}>
            <img src="/assets/logo-full.svg" height="30" alt="HelpDesk" />
          </div>
          <h1 style={{ font: 'var(--font-h2)', color: 'var(--text-strong)', textAlign: 'center', margin: '6px 0 2px' }}>{isRegister ? 'Create your account' : 'Sign in'}</h1>
          <p style={{ font: 'var(--font-small)', color: 'var(--text-muted)', textAlign: 'center', margin: '0 0 22px' }}>{isRegister ? 'Raise and track support tickets' : 'Support portal'}</p>
          <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {isRegister && <Input label="Full name" autoComplete="name" value={fullName} onChange={(e) => setFullName(e.target.value)} />}
            <Input label="Email" type="email" autoComplete="username" value={email} onChange={(e) => setEmail(e.target.value)} />
            <Input label="Password" type="password" autoComplete={isRegister ? 'new-password' : 'current-password'} hint={isRegister ? 'At least 8 characters.' : undefined} value={password} onChange={(e) => setPassword(e.target.value)} />
            {error && <div style={{ font: 'var(--font-small)', color: 'var(--danger)' }}>{error}</div>}
            <Button type="submit" variant="primary" fullWidth disabled={busy || (isRegister && !fullName.trim())}>
              {busy ? 'Please wait…' : (isRegister ? 'Create account' : 'Sign in')}
            </Button>
          </form>
          <p style={{ font: 'var(--font-small)', color: 'var(--text-muted)', textAlign: 'center', marginTop: 18, marginBottom: 0 }}>
            {isRegister
              ? <>Already have an account? <button type="button" className="link-btn" onClick={() => switchMode('login')}>Sign in</button></>
              : <>New here? <button type="button" className="link-btn" onClick={() => switchMode('register')}>Create an account</button></>}
          </p>
          {!isRegister && (
            <p style={{ font: 'var(--font-xs, 11px)', color: 'var(--text-faint)', textAlign: 'center', marginTop: 14, marginBottom: 0, lineHeight: 1.6 }}>
              Demo agent — <span style={{ fontFamily: 'var(--font-mono)' }}>agent@helpdesk.local</span> · <span style={{ fontFamily: 'var(--font-mono)' }}>Agent#12345</span><br />
              Demo customer — <span style={{ fontFamily: 'var(--font-mono)' }}>customer@helpdesk.local</span> · <span style={{ fontFamily: 'var(--font-mono)' }}>Customer#12345</span>
            </p>
          )}
        </Card>
      </div>
    );
  }

  // ---- Root: auth gate + role-based routing -------------------------------
  function Root() {
    const [authed, setAuthed] = React.useState(api.isAuthenticated());
    const [user, setUser] = React.useState(api.currentUser());
    React.useEffect(() => { window.lucide && window.lucide.createIcons(); });

    // If we have a token but no cached user (or no role), fetch /users/me.
    React.useEffect(() => {
      let cancelled = false;
      if (authed && (!user || !user.role)) {
        api.getMe().then((me) => { if (!cancelled && me) setUser({ ...me }); })
          .catch(() => { if (!cancelled) { api.logout(); setAuthed(false); setUser(null); } });
      }
      return () => { cancelled = true; };
    }, [authed]);

    function onAuthed(u) { setUser(u); setAuthed(true); }
    function onLogout() { api.logout(); setAuthed(false); setUser(null); }

    if (!authed) return <AuthView onAuthed={onAuthed} />;
    if (!user || !user.role) return <div className="center-msg">Loading…</div>;
    return user.role === 'Agent'
      ? <AgentApp user={user} onLogout={onLogout} />
      : <CustomerApp user={user} onLogout={onLogout} />;
  }

  // Catch any unhandled render error so the app degrades to a friendly "reload"
  // prompt instead of a blank white screen.
  class ErrorBoundary extends React.Component {
    constructor(props) { super(props); this.state = { error: null }; }
    static getDerivedStateFromError(error) { return { error }; }
    componentDidCatch(error, info) { console.error('HelpDesk UI error:', error, info); }
    render() {
      if (this.state.error) {
        return (
          <div className="center-msg" style={{ height: '100vh' }}>
            <div style={{ font: 'var(--font-h3)', color: 'var(--text-strong)' }}>Something went wrong</div>
            <div style={{ font: 'var(--font-small)', color: 'var(--text-muted)' }}>Please reload the page to continue.</div>
            <Button variant="primary" onClick={() => location.reload()}>Reload</Button>
          </div>
        );
      }
      return this.props.children;
    }
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<ErrorBoundary><Root /></ErrorBoundary>);
</script>
</body>
</html>
