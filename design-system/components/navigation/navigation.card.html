<!DOCTYPE html>

<head>

<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Tabs } = window.HelpDeskDesignSystem_35c226;
  function Demo() {
    const [v, setV] = React.useState("all");
    React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
    return (
      <Tabs
        value={v}
        onChange={setV}
        tabs={[
          { value: "all", label: "All tickets", count: 128 },
          { value: "open", label: "Open", count: 42 },
          { value: "mine", label: "Assigned to me", icon: "user", count: 7 },
          { value: "breached", label: "Breached", icon: "alert-triangle", count: 3 },
        ]}
      />
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
