<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg); font-family: var(--font-sans); }
  .wrap { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px 24px; align-items: start; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input, Select, Textarea, Checkbox, Switch } = window.HelpDeskDesignSystem_35c226;
  function Demo() {
    const [a, setA] = React.useState(true);
    const [b, setB] = React.useState(true);
    return (
      <>
        <Input label="Subject" placeholder="VPN keeps dropping" />
        <Select label="Priority" options={['Low','Medium','High','Urgent']} defaultValue="High" />
        <Input label="Email" type="email" error="Enter a valid email" defaultValue="sam@" />
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14, paddingTop: 22 }}>
          <Checkbox label="Only show escalated" checked={a} onChange={() => setA(!a)} />
          <Switch label="Email me on assignment" checked={b} onChange={() => setB(!b)} />
        </div>
        <Textarea label="Describe the issue" rows={3} placeholder="What happened?" containerStyle={{ gridColumn: '1 / -1' }} />
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
