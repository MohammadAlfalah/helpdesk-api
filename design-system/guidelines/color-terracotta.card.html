<!-- @dsCard group="Colors" viewport="700x150" name="Terracotta — primary brand scale" subtitle="--terracotta-50 → 900, primary = 500" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans)}
  .wrap{padding:20px;display:flex;gap:0;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:#fff}
  .sw b{font-size:11px;font-weight:600}.sw span{font-size:10px;opacity:.85;font-family:var(--font-mono)}
  .dark{color:var(--charcoal-900)}
</style></head>
<body><div class="wrap">
  <div class="sw dark" style="background:var(--terracotta-50)"><b>50</b><span>#FBF0EA</span></div>
  <div class="sw dark" style="background:var(--terracotta-100)"><b>100</b><span>#F6DBCD</span></div>
  <div class="sw dark" style="background:var(--terracotta-200)"><b>200</b><span>#EBB89E</span></div>
  <div class="sw dark" style="background:var(--terracotta-300)"><b>300</b><span>#DF9270</span></div>
  <div class="sw" style="background:var(--terracotta-400)"><b>400</b><span>#D17750</span></div>
  <div class="sw" style="background:var(--terracotta-500);outline:3px solid var(--charcoal-900);outline-offset:-3px"><b>500 ●</b><span>#C25E3C</span></div>
  <div class="sw" style="background:var(--terracotta-600)"><b>600</b><span>#A84E30</span></div>
  <div class="sw" style="background:var(--terracotta-700)"><b>700</b><span>#8A3F28</span></div>
  <div class="sw" style="background:var(--terracotta-800)"><b>800</b><span>#6D3321</span></div>
  <div class="sw" style="background:var(--terracotta-900)"><b>900</b><span>#4F261A</span></div>
</div></body></html>
