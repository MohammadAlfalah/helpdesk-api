<!-- @dsCard group="Colors" viewport="700x150" name="Cream, sand & charcoal — warm neutrals" subtitle="Surfaces and ink that ground the palette" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg);font-family:var(--font-sans)}
  .wrap{padding:20px;display:flex;gap:0;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
  .sw b{font-size:11px;font-weight:600}.sw span{font-size:10px;opacity:.7;font-family:var(--font-mono)}
  .dark{color:var(--charcoal-900)}.light{color:#fff}
</style></head>
<body><div class="wrap">
  <div class="sw dark" style="background:var(--cream-50)"><b>cream-50</b><span>#FDFBF7</span></div>
  <div class="sw dark" style="background:var(--cream-100)"><b>cream-100</b><span>bg</span></div>
  <div class="sw dark" style="background:var(--cream-200)"><b>cream-200</b><span>#F3ECE0</span></div>
  <div class="sw dark" style="background:var(--sand-300)"><b>sand-300</b><span>border</span></div>
  <div class="sw dark" style="background:var(--sand-400)"><b>sand-400</b><span>#D6C8B0</span></div>
  <div class="sw light" style="background:var(--charcoal-500)"><b>char-500</b><span>muted</span></div>
  <div class="sw light" style="background:var(--charcoal-700)"><b>char-700</b><span>body</span></div>
  <div class="sw light" style="background:var(--charcoal-900)"><b>char-900</b><span>ink</span></div>
</div></body></html>
