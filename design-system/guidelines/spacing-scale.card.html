<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale — 4px base" subtitle="--space-1 → 16, the rhythm of every layout" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);color:var(--text-strong)}
  .wrap{padding:24px 26px;display:flex;align-items:flex-end;gap:18px}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--terracotta-300);border-radius:var(--radius-sm)}
  .t{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
</style></head>
<body><div class="wrap">
  <div class="item"><div class="bar" style="width:4px;height:4px"></div><span class="t">1·4</span></div>
  <div class="item"><div class="bar" style="width:8px;height:8px"></div><span class="t">2·8</span></div>
  <div class="item"><div class="bar" style="width:12px;height:12px"></div><span class="t">3·12</span></div>
  <div class="item"><div class="bar" style="width:16px;height:16px"></div><span class="t">4·16</span></div>
  <div class="item"><div class="bar" style="width:24px;height:24px"></div><span class="t">6·24</span></div>
  <div class="item"><div class="bar" style="width:32px;height:32px"></div><span class="t">8·32</span></div>
  <div class="item"><div class="bar" style="width:48px;height:48px"></div><span class="t">12·48</span></div>
  <div class="item"><div class="bar" style="width:64px;height:64px"></div><span class="t">16·64</span></div>
</div></body></html>
