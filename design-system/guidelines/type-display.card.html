<!-- @dsCard group="Type" viewport="700x180" name="Display & headings — Inter" subtitle="Tight tracking, bold weights for hierarchy" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-card);font-family:var(--font-sans);color:var(--text-strong)}
  .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
  .line{display:flex;align-items:baseline;gap:14px}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:96px;flex-shrink:0}
</style></head>
<body><div class="wrap">
  <div class="line"><span class="meta">2xl · 700</span><span style="font:var(--font-h1);letter-spacing:var(--tracking-tight)">Resolve tickets faster</span></div>
  <div class="line"><span class="meta">xl · 600</span><span style="font:var(--font-h2)">Your open tickets</span></div>
  <div class="line"><span class="meta">lg · 600</span><span style="font:var(--font-h3)">VPN keeps dropping every few minutes</span></div>
  <div class="line"><span class="meta">md · 500</span><span style="font:var(--weight-medium) var(--text-md)/1.4 var(--font-sans)">Assigned to Dana Okafor</span></div>
</div></body></html>
