# Run the whole stack with:  docker compose up --build
# Then open Swagger at http://localhost:8090/swagger
services:
  db:
    image: postgres:16-alpine
    # Published so an app run locally (VS Code F5 / dotnet run) can reach Postgres at localhost:5432.
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helpdesk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d helpdesk"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - helpdesk-pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=helpdesk;Username=postgres;Password=postgres"
      # Demo signing key — override with JWT_KEY (or a .env file) so it can't ship to prod unchanged.
      Jwt__Key: "${JWT_KEY:-compose-dev-only-secret-key-change-me-min-32-chars}"
      Jwt__Issuer: "HelpDeskApi"
      Jwt__Audience: "HelpDeskClient"
    ports:
      - "${API_PORT:-8090}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  helpdesk-pgdata:
